name: 自動整理 MEMO烏骨雞

on:
  schedule:
    - cron: '*/30 * * * *'  # 每 30 分鐘 (節省 GHA 用量)
  workflow_dispatch:  # 也可以手動觸發測試

concurrency:
  group: organize
  cancel-in-progress: false  # 排隊不取消，避免一支沒跑完另一支搶資源

jobs:
  organize:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install dropbox

      - name: Run organize
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        run: python scripts/organize_cloud.py
